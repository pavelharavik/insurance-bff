server:
  port: 8080

spring:
  application:
    name: insurance-bff
  jackson:
    serialization:
      write-dates-as-timestamps: false  # Instant → "2026-05-29T00:00:00Z", not epoch millis

# Base URLs are overridden at runtime via environment variables (see docker-compose.yml).
# Defaults point to the WireMock ports used in local development.
upstream:
  system-a:
    url: ${SYSTEM_A_URL:http://localhost:8081}
    connect-timeout-ms: 2000
    read-timeout-ms: 5000
  system-b:
    url: ${SYSTEM_B_URL:http://localhost:8082}
    connect-timeout-ms: 2000
    read-timeout-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
