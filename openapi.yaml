openapi: 3.1.0

info:
  title: Insurance BFF API
  description: >
    Aggregates insurance data from System A (JSON) and System B (XML) in parallel
    and returns the first successful result.
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /insurance/{patientId}:
    get:
      summary: Get insurance record by patient ID
      description: >
        Queries System A and System B concurrently. Returns the first successful
        response. If both upstreams fail, the error with the highest priority is
        returned (500 > 503 > 404).
      operationId: getInsurance
      tags:
        - Insurance
      parameters:
        - name: patientId
          in: path
          required: true
          description: Unique patient identifier
          schema:
            type: string
            example: "001"
      responses:
        "200":
          description: Insurance record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceResponse"
              example:
                id: "001"
                name: "Alice Smith"
                is_active: true
                current_date: "2026-06-01T10:00:00Z"
        "404":
          description: No insurance record found in either upstream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                errorCode: "NOT_FOUND"
                message: "No insurance record found for patient: 001"
                errors: []
        "500":
          description: Both upstreams failed with a 5xx or unexpected 4xx error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                serverError:
                  summary: Upstream 5xx
                  value:
                    errorCode: "UPSTREAM_ERROR"
                    message: "An upstream service error prevented insurance data retrieval"
                    errors: []
                clientError:
                  summary: Unexpected 4xx from upstream
                  value:
                    errorCode: "UPSTREAM_ERROR"
                    message: "Insurance data request was rejected by the upstream service"
                    errors: []
        "503":
          description: Both upstreams timed out or are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                errorCode: "SERVICE_UNAVAILABLE"
                message: "Insurance data is temporarily unavailable"
                errors: []

  /insurance/search:
    post:
      summary: Search insurance record by patient name and birth date
      description: >
        Resolves the patient from the internal index by first name, last name, and
        birth date, then queries both upstreams concurrently. Unknown patients fall
        back to a synthetic ID that returns 404 from all upstreams.
        The request body is validated; constraint violations produce a 400 response
        with per-field error details.
      operationId: searchInsurance
      tags:
        - Insurance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsuranceSearchRequest"
            example:
              firstName: "Alice"
              lastName: "Smith"
              birthDate: "1985-03-15"
      responses:
        "200":
          description: Insurance record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceResponse"
              example:
                id: "001"
                name: "Alice Smith"
                is_active: true
                current_date: "2026-06-01T10:00:00Z"
        "400":
          description: Request body failed validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                errorCode: "VALIDATION_ERROR"
                message: "Request validation failed"
                errors:
                  - errorCode: "REQUIRED"
                    message: "must not be blank"
                    field: "firstName"
        "404":
          description: No insurance record found for the given patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                errorCode: "NOT_FOUND"
                message: "No insurance record found for patient: 999"
                errors: []
        "500":
          description: Both upstreams failed with a 5xx or unexpected 4xx error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                errorCode: "UPSTREAM_ERROR"
                message: "An upstream service error prevented insurance data retrieval"
                errors: []
        "503":
          description: Both upstreams timed out or are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                errorCode: "SERVICE_UNAVAILABLE"
                message: "Insurance data is temporarily unavailable"
                errors: []

components:
  schemas:
    InsuranceResponse:
      type: object
      required:
        - id
        - name
        - is_active
        - current_date
      properties:
        id:
          type: string
          description: Patient identifier
          example: "001"
        name:
          type: string
          description: Full name of the patient
          example: "Alice Smith"
        is_active:
          type: boolean
          description: Whether the insurance policy is currently active
          example: true
        current_date:
          type: string
          format: date-time
          description: UTC timestamp at which this BFF response was generated (ISO 8601)
          example: "2026-06-01T10:00:00Z"

    InsuranceSearchRequest:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
          maxLength: 100
          description: Patient's first name
          example: "Alice"
        lastName:
          type: string
          maxLength: 100
          description: Patient's last name
          example: "Smith"
        birthDate:
          type: string
          format: date
          description: Patient's date of birth (must be in the past)
          example: "1985-03-15"

    ErrorResponse:
      type: object
      required:
        - errorCode
        - message
        - errors
      properties:
        errorCode:
          $ref: "#/components/schemas/TopLevelErrorCode"
        message:
          type: string
          description: Human-readable description of the error
          example: "No insurance record found for patient: 001"
        errors:
          type: array
          description: Per-field validation errors; empty for non-validation failures
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      required:
        - errorCode
        - message
        - field
      properties:
        errorCode:
          $ref: "#/components/schemas/FieldErrorCode"
        message:
          type: string
          description: Human-readable description of this specific violation
          example: "must not be blank"
        field:
          type: string
          description: Name of the offending request field
          example: "firstName"

    TopLevelErrorCode:
      type: string
      description: Top-level error classification
      enum:
        - NOT_FOUND
        - SERVICE_UNAVAILABLE
        - UPSTREAM_ERROR
        - VALIDATION_ERROR

    FieldErrorCode:
      type: string
      description: Field-level constraint violation type
      enum:
        - REQUIRED
        - TOO_LONG
        - INVALID_FORMAT
        - INVALID_VALUE