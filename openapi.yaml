openapi: 3.1.0

info:
  title: Insurance BFF API
  description: >
    Aggregates insurance data from System A (JSON) and System B (XML) in parallel
    and returns the first successful result. Errors follow RFC 7807 Problem Details.
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /insurance/{patientId}:
    get:
      summary: Get insurance record for a patient
      description: >
        Queries System A and System B concurrently. Returns the first successful
        response. If both upstreams fail, the error with the highest priority is
        returned (500 > 503 > 404).
      operationId: getInsurance
      tags:
        - Insurance
      parameters:
        - name: patientId
          in: path
          required: true
          description: Unique patient identifier
          schema:
            type: string
            example: "001"
      responses:
        "200":
          description: Insurance record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceResponse"
              example:
                id: "001"
                name: "Alice Smith"
                is_active: true
                current_date: "2026-06-01T10:00:00Z"
        "404":
          description: No insurance record found in either upstream
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: "about:blank"
                title: "Not Found"
                status: 404
                detail: "No insurance record found for patient: 001"
        "500":
          description: Both upstreams failed; at least one returned a 500 error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: "about:blank"
                title: "Internal Server Error"
                status: 500
                detail: "Upstream service error"
        "503":
          description: Both upstreams timed out or are unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: "about:blank"
                title: "Service Unavailable"
                status: 503
                detail: "Upstream service error"

components:
  schemas:
    InsuranceResponse:
      type: object
      required:
        - id
        - name
        - is_active
        - current_date
      properties:
        id:
          type: string
          description: Patient identifier
          example: "001"
        name:
          type: string
          description: Full name of the patient
          example: "Alice Smith"
        is_active:
          type: boolean
          description: Whether the insurance policy is currently active
          example: true
        current_date:
          type: string
          format: date-time
          description: UTC timestamp at which this BFF response was generated (ISO 8601)
          example: "2026-06-01T10:00:00Z"

    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details for HTTP APIs
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type
          example: "about:blank"
        title:
          type: string
          description: Short, human-readable summary of the problem type
          example: "Not Found"
        status:
          type: integer
          description: HTTP status code
          example: 404
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
          example: "No insurance record found for patient: 001"
        instance:
          type: string
          format: uri
          description: URI identifying the specific occurrence of the problem
