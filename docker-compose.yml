services:

  insurance-bff-reactive:
    build: .
    ports:
      - "8080:8080"
    environment:
      SYSTEM_A_URL: http://wiremock-system-a:8080
      SYSTEM_B_URL: http://wiremock-system-b:8080
    depends_on:
      - wiremock-system-a
      - wiremock-system-b
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Stubs for System A — mappings live in wiremock/system-a/mappings/
  wiremock-system-a:
    image: wiremock/wiremock:3.9.2
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/system-a:/home/wiremock

  # Stubs for System B — mappings live in wiremock/system-b/mappings/
  wiremock-system-b:
    image: wiremock/wiremock:3.9.2
    ports:
      - "8082:8080"
    volumes:
      - ./wiremock/system-b:/home/wiremock
